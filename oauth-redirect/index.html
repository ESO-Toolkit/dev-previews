<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ESO Toolkit — OAuth Redirect</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      .error {
        color: #ff6b6b;
        margin-top: 1rem;
      }
      a {
        color: #64b5f6;
      }
    </style>
    <script>
      // Shared OAuth redirect bounce page for all PR dev previews.
      //
      // OAuth flow for dev previews:
      // 1. PR preview at /dev-previews/pr-XXX/ initiates OAuth login
      // 2. Before redirecting to esologs.com, it stores its base path in localStorage
      // 3. esologs.com redirects back to THIS page (the single registered redirect URI)
      // 4. This page reads the stored return path and forwards the OAuth params
      //    to the correct PR preview's /oauth-redirect route
      //
      // This avoids needing to register a separate redirect URI for every PR.

      (function () {
        var STORAGE_KEY = 'dev_preview_oauth_return_path';

        // Read the return path that was stored before OAuth started
        var returnPath = null;
        try {
          returnPath = localStorage.getItem(STORAGE_KEY);
          // Clean up after reading
          localStorage.removeItem(STORAGE_KEY);
        } catch (e) {
          // localStorage may be blocked
        }

        if (!returnPath) {
          // No return path found — can't determine which PR preview to redirect to.
          // Show an error message (the script below will unhide the error element).
          document.addEventListener('DOMContentLoaded', function () {
            var el = document.getElementById('error');
            if (el) el.style.display = 'block';
          });
          return;
        }

        // Normalise: ensure returnPath ends without trailing slash
        if (returnPath.endsWith('/')) {
          returnPath = returnPath.slice(0, -1);
        }

        // If returnPath is a full URL, extract just the pathname
        try {
          var url = new URL(returnPath);
          returnPath = url.pathname.replace(/\/+$/, '');
        } catch (e) {
          // Not a full URL, treat as a path — just strip trailing slash (already done)
        }

        // Forward all query parameters from the OAuth callback to the PR preview
        var queryString = window.location.search; // e.g. ?code=XXX&state=YYY

        // Redirect to the PR preview's oauth-redirect route
        var destination = returnPath + '/oauth-redirect' + queryString;
        window.location.replace(destination);
      })();
    </script>
  </head>
  <body>
    <div class="container">
      <p>Completing login&hellip;</p>
      <div id="error" style="display: none" class="error">
        <p>
          Could not determine which PR preview to return to.<br />
          The login may have been started from a different browser or tab.
        </p>
        <p><a href="/dev-previews/">Return to preview list</a></p>
      </div>
    </div>
  </body>
</html>
