<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESO Toolkit — Dev Previews</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --danger: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .preview-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .preview-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }
    .preview-item:hover { border-color: var(--accent); }
    .preview-info { display: flex; flex-direction: column; gap: 0.25rem; }
    .preview-name {
      font-weight: 600;
      font-size: 1.05rem;
    }
    .preview-name a {
      color: var(--accent);
      text-decoration: none;
    }
    .preview-name a:hover { color: var(--accent-hover); text-decoration: underline; }
    .preview-meta {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      white-space: nowrap;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-state p { margin-top: 0.5rem; font-size: 0.95rem; }
    #previews-loading { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 ESO Toolkit — Dev Previews</h1>
    <p class="subtitle">Active PR preview deployments. Each PR branch gets its own live preview.</p>

    <div id="previews-loading">Loading previews…</div>
    <ul id="preview-list" class="preview-list" style="display:none;"></ul>
    <div id="empty-state" class="empty-state" style="display:none;">
      <h2>No active previews</h2>
      <p>Preview deployments will appear here when PRs are opened on <a href="https://github.com/ESO-Toolkit/eso-toolkit" style="color:var(--accent);">ESO-Toolkit/eso-toolkit</a>.</p>
    </div>
  </div>

  <script>
    // Read the directory listing from previews.json (generated by the deploy workflow)
    fetch('./previews.json')
      .then(r => r.ok ? r.json() : [])
      .catch(() => [])
      .then(previews => {
        document.getElementById('previews-loading').style.display = 'none';
        const list = document.getElementById('preview-list');
        const empty = document.getElementById('empty-state');

        if (!previews.length) {
          empty.style.display = 'block';
          return;
        }

        // Separate PR previews from local/alias previews
        const prPreviews = previews.filter(p => p.pr != null);
        const aliasPreviews = previews.filter(p => p.alias != null && p.pr == null);

        list.style.display = 'flex';

        prPreviews
          .sort((a, b) => b.pr - a.pr)
          .forEach(p => {
            const li = document.createElement('li');
            li.className = 'preview-item';
            li.innerHTML = `
              <div class="preview-info">
                <div class="preview-name">
                  <a href="./pr-${p.pr}/">#${p.pr}</a> — ${escapeHtml(p.title || p.branch)}
                </div>
                <div class="preview-meta">
                  Branch: <code>${escapeHtml(p.branch)}</code>
                  ${p.updatedAt ? ` · Updated: ${new Date(p.updatedAt).toLocaleString()}` : ''}
                </div>
              </div>
              <span class="badge">PR #${p.pr}</span>
            `;
            list.appendChild(li);
          });

        aliasPreviews
          .sort((a, b) => a.alias.localeCompare(b.alias))
          .forEach(p => {
            const li = document.createElement('li');
            li.className = 'preview-item';
            li.innerHTML = `
              <div class="preview-info">
                <div class="preview-name">
                  <a href="./${encodeURIComponent(p.alias)}/">${escapeHtml(p.alias)}</a>${p.branch ? ' — ' + escapeHtml(p.branch) : ''}
                </div>
                <div class="preview-meta">
                  ${p.commit ? `Commit: <code>${escapeHtml(p.commit)}</code>` : ''}
                  ${p.updatedAt ? ` · Updated: ${new Date(p.updatedAt).toLocaleString()}` : ''}
                </div>
              </div>
              <span class="badge" style="background:rgba(63,185,80,0.15);color:var(--success);">Local</span>
            `;
            list.appendChild(li);
          });
      });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
